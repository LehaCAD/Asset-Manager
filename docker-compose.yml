services:
  db:
    image: postgres:16-alpine
    container_name: apom_db
    environment:
      POSTGRES_DB: apom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apom_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: apom_backend
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
    env_file:
      - path: .env.local
        required: false
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-for-docker
      - POSTGRES_DB=apom_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-raskadrawka-clients}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-ru-1}
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-https://s3.regru.cloud}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-mail.hosting.reg.ru}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_TIMEOUT=${EMAIL_TIMEOUT:-20}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-}
      - SERVER_EMAIL=${SERVER_EMAIL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    container_name: apom_celery
    command: celery -A config worker -l info --concurrency=2 --max-memory-per-child=300000
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
    env_file:
      - path: .env.local
        required: false
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-for-docker
      - POSTGRES_DB=apom_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-raskadrawka-clients}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-ru-1}
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-https://s3.regru.cloud}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-mail.hosting.reg.ru}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_TIMEOUT=${EMAIL_TIMEOUT:-20}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-}
      - SERVER_EMAIL=${SERVER_EMAIL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - backend
      - redis
      - db

  frontend:
    build: ./frontend
    container_name: apom_frontend
    command: npm run dev -- --hostname 0.0.0.0 --webpack
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    depends_on:
      - backend

volumes:
  postgres_data:
